<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub PR Enhancer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      padding: 16px;
      background: #fff;
      color: #24292f;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 .icon { font-size: 20px; }
    .description {
      font-size: 12px;
      color: #57606a;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 6px 10px;
      font-size: 13px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus {
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
    }
    .token-group {
      margin-bottom: 12px;
    }
    .hint {
      font-size: 11px;
      color: #6e7781;
      margin-top: 4px;
    }
    .hint a {
      color: #0969da;
      text-decoration: none;
    }
    .hint a:hover { text-decoration: underline; }
    button {
      width: 100%;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background-color: #2da44e;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.15s;
    }
    button:hover { background-color: #218838; }
    #status {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }
    .status-success { color: #2da44e; }
    .status-error { color: #cb2431; }
    .status-info { color: #0969da; }
    .divider {
      border: none;
      border-top: 1px solid #d8dee4;
      margin: 16px 0;
    }
    .stats {
      font-size: 12px;
      color: #57606a;
    }
    .stats strong { color: #24292f; }
  </style>
</head>
<body>
  <h1><span class="icon">🔀</span> GitHub PR Enhancer</h1>
  <p class="description">
    Adds PR size labels, diff stats, file counts, and age indicators to GitHub's pull request list pages.
  </p>
  <div class="token-group">
    <label for="token">GitHub Personal Access Token</label>
    <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" spellcheck="false" />
    <p class="hint">
      Optional — increases API rate limit from 60 to 5,000 req/hr.
      <a href="https://github.com/settings/tokens/new?scopes=repo&description=PR+Enhancer" target="_blank">Create token →</a>
    </p>
  </div>
  <button id="save">Save Token</button>
  <div id="status"></div>
  <hr class="divider" />
  <div class="stats" id="stats"></div>
  <script src="popup.js"></script>
</body>
</html>
